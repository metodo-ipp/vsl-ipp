kind = "web"
previewPath = "/"
title = "Escola de Governo — Quiz Diagnóstico"
version = "1.0.0"
id = "artifacts/escola-de-governo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21641

[services.development]
run = "pnpm --filter @workspace/escola-de-governo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/escola-de-governo", "run", "build" ]
publicDir = "artifacts/escola-de-governo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21641"
BASE_PATH = "/"
